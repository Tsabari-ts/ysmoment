<div class="page">
  <header class="page-header">
    <h1>יצירת אירוע חדש</h1>
    <p>הגדר את פרטי האירוע והזמנות המגנטים</p>
  </header>

  <form class="card form-grid" (ngSubmit)="submit()">
    <section>
      <h2>פרטי אירוע</h2>
      <label>שם האירוע <input [(ngModel)]="form.name" name="name" required /></label>
      <label>שמות בעלי השמחה <input [(ngModel)]="form.hostNames" name="hostNames" required /></label>
      <label>
        סוג האירוע
        <select [(ngModel)]="form.eventType" name="eventType">
          @for (t of eventTypes; track t.value) {
            <option [ngValue]="t.value">{{ t.label }}</option>
          }
        </select>
      </label>
      <label>תאריך <input type="date" [(ngModel)]="form.date" name="date" required /></label>
    </section>

    <section>
      <h2>גדלי מגנטים זמינים</h2>
      <fieldset class="checkboxes">
        <legend class="visually-hidden">גדלי מגנטים זמינים</legend>
        <label><input type="checkbox" [(ngModel)]="form.sizeSmallAvailable" name="small" /> קטן</label>
        <label><input type="checkbox" [(ngModel)]="form.sizeMediumAvailable" name="medium" /> בינוני</label>
        <label><input type="checkbox" [(ngModel)]="form.sizeLargeAvailable" name="large" /> גדול</label>
      </fieldset>
      <label>מקסימום עותקים <input type="number" min="1" max="20" [(ngModel)]="form.maxCopies" name="maxCopies" /></label>
    </section>

    <section>
      <h2>הגדרות תפעול</h2>
      <label>זמן ממוצע להכנה (דקות) <input type="number" min="1" [(ngModel)]="form.averagePrepTimeMinutes" name="prep" /></label>
      <fieldset class="checkboxes">
        <legend class="visually-hidden">הגדרות תפעול</legend>
        <label><input type="checkbox" [(ngModel)]="form.isActive" name="active" /> האירוע פעיל</label>
        <label><input type="checkbox" [(ngModel)]="form.ordersOpen" name="open" /> קבלת הזמנות פתוחה</label>
      </fieldset>
    </section>

    @if (error) { <p class="error">{{ error }}</p> }

    <button type="submit" class="btn-primary" [disabled]="loading">
      {{ loading ? 'יוצר...' : 'צור אירוע + QR' }}
    </button>
  </form>
</div>
